<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urlaub 2026</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background-image:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{

    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);

    padding:70px 100px;

    border-radius:35px;

    text-align:center;

    color:white;

    box-shadow:0 15px 50px rgba(0,0,0,0.35);
}

.title{

    font-size:5vw;

    letter-spacing:4px;

    text-transform:uppercase;

    font-weight:300;

    margin-bottom:30px;
}

.days{

    font-size:14vw;

    font-weight:700;

    line-height:1;
}

</style>

</head>

<body>

<div class="overlay">

    <div class="title">
        Urlaub 2026 ☀️
    </div>

    <div class="days" id="days">
        Lädt...
    </div>

</div>

<script>

const vacationDate = new Date("2026-07-27T07:00:00");

function updateCountdown(){

    const now = new Date();
    const diff = vacationDate - now;

    if(diff <= 0){

        document.getElementById("days").innerHTML =
        "Urlaub! 🎉";

        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));

    const hours = Math.floor(
        (diff % (1000 * 60 * 60 * 24))
        / (1000 * 60 * 60)
    );

    const minutes = Math.floor(
        (diff % (1000 * 60 * 60))
        / (1000 * 60)
    );

    const seconds = Math.floor(
        (diff % (1000 * 60))
        / 1000
    );

    document.getElementById("days").innerHTML =
        days +
        "<span style='font-size:5vw'> Tage</span>" +
        "<div style='font-size:3vw;margin-top:25px'>" +
        hours + " Std &nbsp;&nbsp; " +
        minutes + " Min &nbsp;&nbsp; " +
        seconds + " Sek" +
        "</div>";
}

updateCountdown();

setInterval(updateCountdown, 1000);

</script>

</body>
</html>
