<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urlaub 2026</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background-image:url("https://images.unsplash.com/photo-1666112402453-9f5f2c8d4f6?auto=format&fit=crop&w=1920&q=80");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{

    background:rgba(0,0,0,0.28);
    backdrop-filter:blur(6px);

    padding:70px 100px;

    border-radius:35px;

    text-align:center;

    color:white;

    box-shadow:0 15px 50px rgba(0,0,0,0.35);
}

.title{

    font-size:4vw;

    letter-spacing:4px;

    text-transform:uppercase;

    font-weight:300;

    margin-bottom:20px;
}

.days{

    font-size:16vw;

    font-weight:700;

    line-height:1;
}

.label{

    font-size:3vw;

    margin-top:10px;

    letter-spacing:2px;
}

.subtitle{

    font-size:2.2vw;

    margin-top:25px;

    opacity:0.95;
}

</style>
</head>

<body>

<div class="overlay">

    <div class="title">
        Urlaub 2026 ☀️
    </div>

    <div class="days" id="days">
        0
    </div>

    <div class="label">
        Tage
    </div>

    <div class="subtitle">
        bis zum Gardasee 🇮🇹
    </div>

</div>

<script>

const vacationDate = new Date("2026-07-27T00:00:00");

function updateCountdown(){

    const now = new Date();

    const diff = vacationDate - now;

    const days = Math.ceil(
        diff / (1000 * 60 * 60 * 24)
    );

    document.getElementById("days").innerText =
        Math.max(days, 0);
}

updateCountdown();

setInterval(updateCountdown, 60000);

</script>

</body>
</html>
