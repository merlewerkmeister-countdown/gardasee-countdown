<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urlaub 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background-image:url("https://images.unsplash.com/photo-1590579491624-f98f36d4c763");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(8px);
    border-radius:30px;
    padding:60px 80px;
    text-align:center;
    color:white;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.title{
    font-size:4vw;
    font-weight:300;
    letter-spacing:4px;
    text-transform:uppercase;
}

.days{
    font-size:12vw;
    font-weight:700;
    line-height:1;
    margin-top:20px;
}

.label{
    font-size:3vw;
    margin-top:10px;
}

.subtitle{
    font-size:2vw;
    margin-top:30px;
    opacity:0.95;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="title">Urlaub 2026</div>

    <div class="days" id="days">0</div>

    <div class="label">Tage</div>

    <div class="subtitle">
        bis zum Gardasee 🇮🇹 ☀️
    </div>
</div>

<script>

const vacationDate = new Date("2026-07-27T00:00:00");

function updateCountdown(){

    const now = new Date();

    const diff = vacationDate - now;

    const days = Math.ceil(
        diff / (1000 * 60 * 60 * 24)
    );

    document.getElementById("days").innerText =
        Math.max(days,0);
}

updateCountdown();

setInterval(updateCountdown,60000);

</script>

</body>
</html>
