<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gardasee Countdown</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

body {
    background-image: url("https://images.unsplash.com/photo-1590579491624-f98f36d4c763");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
}

.overlay {
    background: rgba(0,0,0,0.35);
    padding: 50px;
    border-radius: 30px;
    text-align: center;
    color: white;
    backdrop-filter: blur(4px);
}

h1 {
    font-size: 4vw;
    margin-bottom: 20px;
}

#countdown {
    font-size: 10vw;
    font-weight: bold;
    line-height: 1;
}

.subtitle {
    font-size: 2.5vw;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="overlay">
    <h1>Noch bis zum Gardasee</h1>
    <div id="countdown"></div>
    <div class="subtitle">Urlaub wir kommen! 🇮🇹☀️</div>
</div>

<script>
const targetDate = new Date("2026-07-25T00:00:00");

function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));

    document.getElementById("countdown").innerHTML =
        days + "<br><span style='font-size:4vw'>Tage</span>";
}

updateCountdown();
setInterval(updateCountdown, 60000);
</script>

</body>
</html>
